<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अलादीन AI ऑटोमेशन</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .chat-container {
            flex: 1;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            background: #1e1e1e;
        }
        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }
        .user-message {
            background-color: #007bff;
            margin-left: auto;
            text-align: right;
        }
        .ai-message {
            background-color: #2d2d2d;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            background: #007bff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .section-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .connect-btn {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            text-align: left;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .connect-btn:active {
            background: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            background: #1e1e1e;
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #2d2d2d;
            font-size: 13px;
        }
        th {
            background: #252525;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chatBox">
        <div class="message ai-message">राम राम भाई! मैं आपका अलादीन एआई एजेंट हूँ। मुझे आप हिंदी में बताइए, जैसे: 'यूट्यूब पर वीडियो लगाओ 4 बजे' या 'फेसबुक पर रील अपलोड करो'।</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="यहाँ टाइप करें...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="section-title">INTEGRATIONS & PERMISSIONS</div>
    <div class="btn-grid">
        <button class="connect-btn" onclick="connectPlatform('google')">🔗 Submit Permission to Google Drive</button>
        <button class="connect-btn" onclick="connectPlatform('youtube')">🔗 Submit Permission to YouTube</button>
        <button class="connect-btn" onclick="connectPlatform('instagram')">🔗 Submit Permission to Instagram</button>
        <button class="connect-btn" onclick="connectPlatform('facebook')">🔗 Submit Permission to Facebook Link</button>
    </div>

    <div class="section-title">RUNNING AUTOMATIONS DASHBOARD</div>
    <table>
        <thead>
            <tr>
                <th>Automation ID</th>
                <th>Execution Method</th>
                <th>Live Status/Logs</th>
            </tr>
        </thead>
        <tbody id="dashboardBody">
            <tr>
                <td colspan="3" style="text-align:center; color:#666;">No automations running</td>
            </tr>
        </tbody>
    </table>

    <script>
        // सीधे बिना किसी बाहरी स्क्रिप्ट के पक्का काम करेगा
        function connectPlatform(platform) {
            window.open('/oauth/' + platform, '_blank', 'width=500,height=600');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user-message');
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                appendMessage(data.reply, 'ai-message');
            } catch (error) {
                appendMessage("सर्वर से कनेक्ट करने में दिक्कत आ रही है भाई।", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/api/automations');
                const data = await response.json();
                const tbody = document.getElementById('dashboardBody');
                
                if (!data.automations || data.automations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#666;">No automations running</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.automations.forEach(task => {
                    const row = `<tr>
                        <td style="color:#007bff; font-weight:bold;">${task.id}</td>
                        <td>${task.method}</td>
                        <td style="color:#28a745;">${task.status}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (e) {
                console.log("Dashboard update failed");
            }
        }

        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
