<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Automation Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
        }
        /* Mobile layout container */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #27272a;
            border-right: 1px solid #27272a;
        }
        
        /* 1. Chat Box at the top */
        #chat-box {
            flex: 1; /* Takes remaining space to push everything else down */
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid #27272a;
        }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg.ai { background-color: #27272a; align-self: flex-start; border-bottom-left-radius: 2px;}
        .msg.user { background-color: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px;}

        /* 2. Input Text Field + Send Button */
        #input-section {
            display: flex;
            padding: 10px;
            background-color: #18181b;
            border-bottom: 1px solid #27272a;
        }
        #chat-input {
            flex: 1;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            outline: none;
        }
        #send-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0 20px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 3. Permissions Section */
        #permissions-section {
            padding: 15px;
            background-color: #121212;
            border-bottom: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .section-title { font-size: 12px; text-transform: uppercase; color: #a1a1aa; margin-bottom: 5px; font-weight: 600; }
        .perm-btn {
            background: #18181b;
            color: #d4d4d8;
            border: 1px solid #3f3f46;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .perm-btn:active { background: #27272a; }

        /* 4. Running Automations Dashboard */
        #dashboard-section {
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            background-color: #09090b;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #27272a; padding: 8px; text-align: left; }
        th { background-color: #18181b; color: #a1a1aa; font-weight: normal;}
        td { color: #d4d4d8; }
        .status-badge { color: #34d399; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <!-- 1. Chat Box -->
        <div id="chat-box">
            <div class="msg ai">Hello! I am your AI Automations Agent. What would you like to schedule today?</div>
        </div>

        <!-- 2. Input Field + Send -->
        <div id="input-section">
            <input type="text" id="chat-input" placeholder="e.g. Schedule a YouTube video for 5 AM..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>

        <!-- 3. Permissions Section -->
        <div id="permissions-section">
            <div class="section-title">Integrations & Permissions</div>
            <button class="perm-btn" onclick="openOAuth('google-drive')">Submit Permission to Google Drive</button>
            <button class="perm-btn" onclick="openOAuth('instagram')">Submit Permission to Instagram</button>
            <button class="perm-btn" onclick="openOAuth('youtube')">Submit Permission to YouTube</button>
        </div>

        <!-- 4. Running Automations Dashboard -->
        <div id="dashboard-section">
            <div class="section-title">Running Automations Dashboard</div>
            <table>
                <thead>
                    <tr>
                        <th>Automation Name/ID</th>
                        <th>Execution Method</th>
                        <th>Live Status/Logs</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body">
                    <tr><td colspan="3" style="text-align: center; color: #71717a;">No automations running</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");
        const dashboardBody = document.getElementById("dashboard-body");

        function handleKeyPress(e) {
            if (e.key === "Enter") sendMessage();
        }

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            chatInput.value = "";

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                appendMessage(data.reply, "ai");
            } catch (err) {
                appendMessage("Error communicating with AI agent.", "ai");
            }
        }

        function openOAuth(platform) {
            // Opens a simulated pop-up window
            window.open(`/oauth/${platform}`, 'OAuth', 'width=400,height=500,left=200,top=100');
        }

        async function pollAutomations() {
            try {
                const response = await fetch("/api/automations");
                const data = await response.json();
                const tasks = data.automations;

                if (tasks.length === 0) return;

                dashboardBody.innerHTML = ""; // Clear existing rows

                tasks.forEach(task => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${task.id}</td>
                        <td>${task.method}</td>
                        <td class="status-badge">${task.status}</td>
                    `;
                    dashboardBody.appendChild(tr);
                });
            } catch (err) {
                console.error("Dashboard sync error:", err);
            }
        }

        // Poll the backend every 2 seconds to update the Live Status/Logs
        setInterval(pollAutomations, 2000);
    </script>
</body>
  </html>
